version: 2

builds:
  - binary: scout
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/scoutapm/scout/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "scout-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: scoutapp
      name: homebrew-scout-cli
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: scout-cli
    binaries:
      - scout
    homepage: "https://github.com/scoutapp/scout-cli"
    description: "Scout APM CLI — monitor application performance from the terminal"
