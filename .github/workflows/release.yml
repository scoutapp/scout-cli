name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          export REVISION="${GITHUB_SHA}"

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/scoutapp/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove old cask if it exists (migrating to source-based formula)
          rm -f Casks/scout-cli.rb

          mkdir -p Formula
          envsubst < "$GITHUB_WORKSPACE/homebrew/scout-cli.rb.template" > Formula/scout-cli.rb

          git add -A
          git commit -m "Update scout-cli formula to v${VERSION}" || echo "No changes to commit"
          git push
